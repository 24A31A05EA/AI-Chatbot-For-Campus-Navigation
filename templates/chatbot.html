<!DOCTYPE html>
<html>

<head>

<title>Campus AI Chatbot</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#111;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar h3{
margin-bottom:20px;
text-align:center;
}

.sidebar button{
margin:8px 0;
padding:10px;
border:none;
background:#333;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.sidebar button:hover{
background:#0072ff;
}

/* CHAT AREA */

.chat-wrapper{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.chat-container{
width:450px;
height:620px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

.chat-header{
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
padding:18px;
font-size:20px;
text-align:center;
font-weight:bold;
}

/* CHAT BOX */

.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
}

/* MESSAGES */

.message{
display:flex;
margin:8px 0;
}

.message span{
padding:12px 16px;
border-radius:15px;
max-width:70%;
font-size:15px;
animation:fadeIn 0.3s ease;
}

.user{
justify-content:flex-end;
}

.user span{
background:#0072ff;
color:white;
border-bottom-right-radius:5px;
}

.bot span{
background:white;
color:#333;
border-bottom-left-radius:5px;
}

.avatar{
font-size:20px;
margin-right:8px;
}

/* INPUT AREA */

.input-area{
display:flex;
padding:10px;
background:white;
}

.input-area input{
flex:1;
padding:12px;
border:none;
outline:none;
font-size:15px;
}

.input-area button{
background:#0072ff;
border:none;
color:white;
padding:0 22px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.input-area button:hover{
background:#005bd3;
}

/* TYPING DOTS */

.typing{
display:none;
margin-left:28px;
}

.typing span{
display:inline-block;
width:6px;
height:6px;
margin:2px;
background:#999;
border-radius:50%;
animation:blink 1.4s infinite;
}

.typing span:nth-child(2){
animation-delay:0.2s;
}

.typing span:nth-child(3){
animation-delay:0.4s;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(5px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes blink{
0%,80%,100%{opacity:0}
40%{opacity:1}
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Campus Places</h3>

<button onclick="quickAsk('library')">📚 Library</button>
<button onclick="quickAsk('cse block')">💻 CSE Block</button>
<button onclick="quickAsk('canteen')">🍴 Canteen</button>
<button onclick="quickAsk('hostel')">🏠 Hostel</button>
<button onclick="quickAsk('playground')">🏏 Playground</button>

</div>

<!-- CHAT AREA -->

<div class="chat-wrapper">

<div class="chat-container">

<div class="chat-header">
🤖 Campus AI Navigator
</div>

<div class="chat-box" id="chat-box">

<div class="message bot">
<div class="avatar">🤖</div>
<span>Hello 👋 Ask me about campus locations.</span>
</div>

</div>

<div class="typing" id="typing">
<span></span><span></span><span></span>
</div>

<div class="input-area">

<input id="user-input" placeholder="Ask something like 'Where is the library?'">

<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>

<script>

function addUserMessage(text){

let chatBox=document.getElementById("chat-box")

let msg=document.createElement("div")
msg.className="message user"
msg.innerHTML="<span>"+text+"</span>"

chatBox.appendChild(msg)

chatBox.scrollTo({
top:chatBox.scrollHeight,
behavior:"smooth"
})

}

function addBotMessage(text){

let chatBox=document.getElementById("chat-box")

let msg=document.createElement("div")
msg.className="message bot"
msg.innerHTML='<div class="avatar">🤖</div><span>'+text+'</span>'

chatBox.appendChild(msg)

chatBox.scrollTo({
top:chatBox.scrollHeight,
behavior:"smooth"
})

}

function sendMessage(){

let input=document.getElementById("user-input")
let message=input.value

if(message.trim()=="") return

addUserMessage(message)

input.value=""

document.getElementById("typing").style.display="block"

fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})
.then(res=>res.json())
.then(data=>{

document.getElementById("typing").style.display="none"

addBotMessage(data.reply)

})

}

function quickAsk(place){

document.getElementById("user-input").value=place
sendMessage()

}

document.getElementById("user-input")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage()
}

})

</script>

</body>

</html>
